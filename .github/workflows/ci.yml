name: QuickQC CI

on:
  push:
    branches: ["main", "master"]
    tags: ["0.*", "v*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-native:
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-ubuntu-amd64
            runner: ubuntu-latest
            distro: ubuntu
          - id: linux-ubuntu-arm64
            runner: ubuntu-24.04-arm
            distro: ubuntu
          - id: macos-amd64
            runner: macos-15-intel
            qt_host: mac
            qt_target: clang_64
            qt_prefix: macos
            experimental: true
          - id: macos-arm64
            runner: macos-15
            qt_host: mac
            qt_target: clang_64
            qt_prefix: macos
          - id: windows-amd64
            runner: windows-latest
            qt_host: windows
            qt_target: win64_msvc2019_64
            qt_prefix: msvc2019_64
          - id: windows-arm64
            runner: windows-11-arm
            qt_host: windows
            qt_target: win64_msvc2019_arm64
            qt_prefix: msvc2019_arm64
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Ubuntu build dependencies
        if: matrix.distro == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6opengl6-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libfreetype6-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrender-dev \
            libxcb1-dev \
            libxcb-cursor0 \
            libxcb-glx0 \
            libxcb-keysyms1 \
            libxcb-image0 \
            libxcb-shm0 \
            libxcb-icccm4 \
            libxcb-sync-dev \
            libxcb-xfixes0 \
            libxcb-shape0 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Setup Python
        if: matrix.qt_host != ''
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Qt with aqt (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall==3.2.1
          python -m aqt install-qt mac desktop 6.7.3 clang_64 --outputdir qt6

      - name: Install Qt with aqt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall==3.2.1
          if ('${{ matrix.id }}' -eq 'windows-arm64') {
            python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 --outputdir qt6
            python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_arm64 --outputdir qt6
          } else {
            python -m aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 --outputdir qt6
          }

      - name: Export Qt path (macOS)
        if: runner.os == 'macOS'
        run: echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/qt6/6.7.3/${{ matrix.qt_prefix }}" >> "$GITHUB_ENV"

      - name: Export Qt path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ('${{ matrix.id }}' -eq 'windows-arm64') {
            "CMAKE_PREFIX_PATH=$env:GITHUB_WORKSPACE\qt6\6.7.3\msvc2019_arm64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "QT_HOST_PATH=$env:GITHUB_WORKSPACE\qt6\6.7.3\msvc2019_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "CMAKE_PREFIX_PATH=$env:GITHUB_WORKSPACE\qt6\6.7.3\${{ matrix.qt_prefix }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ('${{ matrix.id }}' -eq 'windows-arm64') {
            cmake -S . -B build -A ARM64 -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH" -DQT_HOST_PATH="$env:QT_HOST_PATH"
          } else {
            cmake -S . -B build -A x64 -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH"
          }

      - name: Configure (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Build (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Install bundle (macOS)
        if: runner.os == 'macOS'
        run: cmake --install build --config Release --prefix dist

      - name: Verify bundle links (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_BIN="dist/quickqc.app/Contents/MacOS/quickqc"
          APP_SQL_FRAMEWORK="dist/quickqc.app/Contents/Frameworks/QtSql.framework/Versions/A/QtSql"
          APP_SQL_DRIVER="dist/quickqc.app/Contents/PlugIns/sqldrivers/libqsqlite.dylib"
          test -f "$APP_BIN"
          test -f "$APP_SQL_FRAMEWORK"
          test -f "$APP_SQL_DRIVER"
          otool -L "$APP_BIN"
          otool -L "$APP_BIN" | grep -Eq "(@executable_path/../Frameworks|@rpath)/QtSql.framework/Versions/A/QtSql"
          otool -l "$APP_BIN" | grep -A2 LC_RPATH | grep -q "@executable_path/../Frameworks"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ -d dist/quickqc.app ]; then
              tar -czf quickqc-${{ matrix.id }}.tar.gz -C dist quickqc.app
            else
              echo "Installed macOS bundle not found at dist/quickqc.app" >&2
              exit 1
            fi
          elif [ -f build/quickqc ]; then
            tar -czf quickqc-${{ matrix.id }}.tar.gz -C build quickqc
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "build/Release/quickqc.exe") {
            Compress-Archive -Path "build/Release/quickqc.exe" -DestinationPath "quickqc-${{ matrix.id }}.zip" -Force
          }
          elseif (Test-Path "build/quickqc.exe") {
            Compress-Archive -Path "build/quickqc.exe" -DestinationPath "quickqc-${{ matrix.id }}.zip" -Force
          }
          else {
            throw "Build output not found"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: quickqc-${{ matrix.id }}
          path: |
            quickqc-${{ matrix.id }}.tar.gz
            quickqc-${{ matrix.id }}.zip

  build-fedora:
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental || false }}
    container:
      image: fedora:41
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-fedora-amd64
            runner: ubuntu-latest
          - id: linux-fedora-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Fedora build dependencies
        run: |
          dnf -y update
          dnf -y install \
            cmake \
            ninja-build \
            gcc-c++ \
            git \
            tar \
            gzip \
            which \
            qt6-qtbase-devel \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            libxkbcommon-devel \
            fontconfig-devel \
            dbus-devel \
            freetype-devel \
            libX11-devel \
            libXext-devel \
            libXfixes-devel \
            libXi-devel \
            libXrender-devel \
            libxcb-devel \
            xcb-util-devel \
            xcb-util-keysyms-devel \
            xcb-util-image-devel \
            xcb-util-wm-devel \
            xcb-util-renderutil-devel

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          if [ -f build/quickqc ]; then
            tar -czf quickqc-${{ matrix.id }}.tar.gz -C build quickqc
          else
            echo "Build output not found" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: quickqc-${{ matrix.id }}
          path: quickqc-${{ matrix.id }}.tar.gz

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-native, build-fedora]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Generate release notes from changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          ./scripts/generate-release-notes.sh "$TAG_NAME" CHANGELOG.md .github/release-notes.generated.md

      - name: Generate checksums manifest
        run: |
          cd dist-artifacts
          ls -1 quickqc-* >/dev/null
          sha256sum quickqc-* > quickqc-checksums.txt

      - name: Publish GitHub Release (official gh CLI)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG_NAME" >/dev/null 2>&1 && gh release delete "$TAG_NAME" --yes || true
          gh release create "$TAG_NAME" dist-artifacts/* \
            --title "QuickQC $TAG_NAME" \
            --notes-file .github/release-notes.generated.md
